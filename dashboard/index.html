<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amalia — Dashboard</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<header>
  <h1>🐝 Amalia</h1>
  <nav>
    <button class="tab active" data-tab="bees">Bees</button>
    <button class="tab" data-tab="tasks">Tasks</button>
    <button class="tab" data-tab="conflicts">Conflicts</button>
  </nav>
  <div id="login-area">
    <input type="password" id="token-input" placeholder="Operator token" size="40">
    <button id="connect-btn">Connect</button>
    <span id="conn-status" class="status-dot disconnected"></span>
    <span id="conn-msg" class="conn-msg"></span>
  </div>
</header>

<main>
  <!-- Bees panel -->
  <section id="panel-bees" class="panel active">
    <h2>Active bees</h2>
    <table id="bees-table">
      <thead><tr><th>Name</th><th>Engine</th><th>Status</th><th>Heartbeat</th><th>Current task</th></tr></thead>
      <tbody></tbody>
    </table>
  </section>

  <!-- Tasks panel -->
  <section id="panel-tasks" class="panel">
    <h2>Tasks</h2>
    <div class="filters">
      <label>Status: <select id="filter-status">
        <option value="">All</option>
        <option value="pending">Pending</option>
        <option value="in_progress">In Progress</option>
        <option value="completed">Completed</option>
        <option value="blocked">Blocked</option>
        <option value="failed">Failed</option>
        <option value="cancelled">Cancelled</option>
      </select></label>
      <label>Bee: <select id="filter-bee"><option value="">All</option></select></label>
    </div>
    <div class="task-layout">
      <div class="task-list-col">
        <table id="tasks-table">
          <thead><tr><th>Code</th><th>Slug</th><th>Status</th><th>Bee</th><th>Priority</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
      <div class="task-detail-col" id="task-detail">
        <p class="hint">Select a task to see its detail</p>
      </div>
    </div>

    <h3>Create task</h3>
    <form id="create-task-form">
      <label>Target bee: <select id="create-bee" required></select></label>
      <label>Description: <textarea id="create-desc" required></textarea></label>
      <label>Priority: <select id="create-priority">
        <option value="high">High</option>
        <option value="medium" selected>Medium</option>
        <option value="low">Low</option>
      </select></label>
      <label>Slug: <input id="create-slug" placeholder="my-slug" required></label>
      <label>Dependencies (comma-separated codes): <input id="create-deps" placeholder="TASK-1,TASK-2"></label>
      <label>Max attempts: <input id="create-max-attempts" type="number" value="3" min="1"></label>
      <button type="submit">Create task</button>
      <span id="create-result"></span>
    </form>
  </section>

  <!-- Conflicts panel -->
  <section id="panel-conflicts" class="panel">
    <h2>Detected conflicts</h2>
    <ul id="conflict-list"></ul>
  </section>
</main>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="app.js"></script>
</body>
</html>
